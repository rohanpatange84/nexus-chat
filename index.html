<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Chat — Connect Instantly</title>
  <meta name="description" content="Nexus Chat is a modern, real-time chat application with beautiful UI and seamless messaging experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Auth Screen -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-modal">
      <div class="brand auth-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor"/>
          </svg>
        </div>
        <span class="brand-name">Nexus</span>
      </div>
      <h2 id="authTitle">Welcome Back</h2>
      <p id="authSubtitle">Sign in to continue to Nexus Chat.</p>

      <form id="authForm">
        <div class="input-group" id="nameGroup" style="display:none;">
          <label for="authName">Full Name</label>
          <input type="text" id="authName" placeholder="Name" />
        </div>
        <div class="input-group">
          <label for="authEmail">Email Address</label>
          <input type="email" id="authEmail" placeholder="you@example.com" required />
        </div>
        <div class="input-group">
          <label for="authPassword">Password</label>
          <input type="password" id="authPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary auth-btn" id="authSubmitBtn">Sign In</button>
      </form>
      
      <div class="auth-switch">
        <span id="authSwitchText">Don't have an account?</span>
        <button type="button" id="authSwitchBtn">Sign Up</button>
      </div>
    </div>
  </div>

  <div class="app-container" id="appContainer" style="display:none;">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="currentColor"/>
            </svg>
          </div>
          <span class="brand-name">Nexus</span>
        </div>
        <button class="icon-btn" id="newChatBtn" title="New Chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>

      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search conversations..." />
      </div>

      <div class="section-label">Direct Messages</div>
      <ul class="contact-list" id="contactList">
        <!-- populated by JS -->
      </ul>

      <div class="section-label">Group Channels</div>
      <ul class="contact-list" id="groupList">
        <!-- populated by JS -->
      </ul>

      <div class="sidebar-footer">
        <div class="user-avatar-wrap">
          <div class="avatar avatar-me" id="myAvatar">R</div>
          <div class="status-dot online"></div>
        </div>
        <div class="user-info">
          <span class="user-name">Rohan</span>
          <span class="user-status">Online</span>
        </div>
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Chat Area -->
    <main class="chat-area" id="chatArea">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" fill="url(#grad1)"/>
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#7c3aed"/>
                <stop offset="100%" style="stop-color:#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2>Welcome to Nexus Chat</h2>
        <p>Select a conversation or start a new one to begin chatting.</p>
        <button class="btn-primary" id="startChatBtn">Start a Conversation</button>
      </div>

      <!-- Active chat -->
      <div class="chat-window" id="chatWindow" style="display:none;">
        <header class="chat-header" id="chatHeader">
          <button class="icon-btn mobile-back" id="backBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="chat-peer-info">
            <div class="avatar-wrap">
              <div class="avatar" id="peerAvatar">A</div>
              <div class="status-dot" id="peerStatus"></div>
            </div>
            <div>
              <div class="peer-name" id="peerName">Alice</div>
              <div class="peer-meta" id="peerMeta">Online</div>
            </div>
          </div>
          <div class="chat-actions">
            <button class="icon-btn" title="Voice Call" id="callBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.42 2 2 0 0 1 3.6 1.25h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.83A16 16 0 0 0 16 16.91l1.14-.95a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </button>
            <button class="icon-btn" title="Video Call" id="videoBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
            </button>
            <button class="icon-btn" title="More Options" id="moreBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>
              </svg>
            </button>
          </div>
        </header>

        <div class="messages-container" id="messagesContainer">
          <!-- Messages rendered by JS -->
        </div>

        <div class="typing-indicator" id="typingIndicator" style="display:none;">
          <div class="avatar typing-avatar" id="typingAvatar">A</div>
          <div class="typing-bubble">
            <span></span><span></span><span></span>
          </div>
        </div>

        <footer class="input-area">
          <button class="icon-btn attach-btn" title="Attach File" id="attachBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <div class="input-wrap">
            <input type="text" id="messageInput" placeholder="Type a message…" autocomplete="off" />
            <button class="emoji-btn" id="emojiBtn" title="Emoji">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
              </svg>
            </button>
          </div>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </footer>

        <!-- Emoji Picker -->
        <div class="emoji-picker" id="emojiPicker" style="display:none;">
          <!-- populated by JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- New Chat Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3>New Conversation</h3>
        <button class="icon-btn" id="closeModal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <input type="text" id="modalSearch" placeholder="Search people to chat with…" />
      <ul class="modal-contact-list" id="modalContactList">
        <!-- populated by JS -->
      </ul>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu hidden" id="messageContextMenu">
    <div class="context-menu-item" id="deleteOption">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;color:#ef4444;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      Delete Message
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
